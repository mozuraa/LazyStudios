<!DOCTYPE html>
<html lang="pt-PT" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lazy Studios - Dashboard</title>
  <link rel="stylesheet" href="src/styles/dashboard.css">
  <link rel="stylesheet" href="src/styles/main.css">
</head>
<body>
  <div class="dash-login" id="loginPage">
    <div class="logo">💼</div>
    <h1>Lazy Studios Admin</h1>
    <div class="dash-card">
      <div id="loginAlert" class="dash-alert"></div>
      <form id="loginForm" class="dash-form">
        <div class="dash-field">
          <label>Utilizador</label>
          <input type="text" id="loginUser" autocomplete="username" required>
        </div>
        <div class="dash-field">
          <label>Password</label>
          <input type="password" id="loginPass" autocomplete="current-password" required>
        </div>
        <button type="submit" class="dash-btn dash-btn--primary">Entrar</button>
      </form>
    </div>
  </div>

  <div id="dashboardPage" style="display:none;">
    <div class="dash-container">
      <header class="dash-header">
        <h1>🎛️ Dashboard - Lazy Studios</h1>
        <div class="dash-header-actions">
          <a href="https://lazy-studios.vercel.app/" target="_blank" class="dash-btn dash-btn--ghost">🌐 Ver Site</a>
          <button id="logoutBtn" class="dash-btn dash-btn--ghost">Sair</button>
        </div>
      </header>

      <div class="dash-tabs">
        <button class="dash-tab dash-tab--active" data-tab="projects">📋 Projects</button>
        <button class="dash-tab" data-tab="add">➕ Add Project</button>
        <button class="dash-tab" data-tab="github">🐙 Publish</button>
      </div>

      <!-- Projects List Tab -->
      <div id="tab-projects" class="tab-content">
        <div class="dash-card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
            <h2>📋 Existing Projects</h2>
            <button class="dash-btn dash-btn--primary" onclick="Dashboard.openAddModal()">+ New Project</button>
          </div>
          <div id="projectsList" class="dash-grid"></div>
        </div>
      </div>

      <!-- Add/Edit Project Tab -->
      <div id="tab-add" class="tab-content" style="display:none;">
        <div style="margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center;">
          <span id="saveIndicator" style="font-size:0.85rem;color:var(--dash-success);opacity:0;transition:opacity 0.3s;">💾 Saved</span>
          <button class="dash-btn dash-btn--ghost" onclick="Dashboard.openAddModal()">+ New Project</button>
        </div>
        <div class="dash-card">
          <h2>➕ Add Project</h2>
          <form id="addProjectForm" class="dash-form">
            <div class="dash-row">
              <div class="dash-field">
                <label>Title</label>
                <input type="text" id="projTitle" placeholder="Project name" required>
              </div>
              <div class="dash-field">
                <label>Category</label>
                <select id="projCategory">
                  <option value="app">📱 App</option>
                  <option value="web">🌐 Web</option>
                  <option value="file">📄 File</option>
                  <option value="other">📁 Other</option>
                </select>
              </div>
            </div>

            <div class="dash-field">
              <label>Subtitle</label>
              <input type="text" id="projSubtitle" placeholder="Short description">
            </div>

            <div class="dash-field">
              <label>Description</label>
              <textarea id="projDesc" rows="4" placeholder="Detailed project description..."></textarea>
            </div>

            <div class="dash-field">
              <label>Thumbnail URL</label>
              <input type="url" id="projThumbnail" placeholder="https://... or public/images/projects/...">
            </div>

            <div class="project-form-section">
              <h3>🔗 Links</h3>
              <div class="dash-row">
                <div class="dash-field">
                  <label>Demo/Site URL</label>
                  <input type="url" id="projLinkDemo" placeholder="https://...">
                </div>
                <div class="dash-field">
                  <label>Source Code (GitHub)</label>
                  <input type="url" id="projLinkSource" placeholder="https://github.com/...">
                </div>
              </div>
            </div>

            <button type="submit" class="dash-btn dash-btn--success">💾 Save Project</button>
          </form>
        </div>
      </div>

      <!-- GitHub Publish Tab -->
      <div id="tab-github" class="tab-content" style="display:none;">
        <div class="dash-card">
          <h2>🐙 Publish to GitHub</h2>
          <p style="color:var(--dash-muted);margin-bottom:1rem;">
            Commit changes to GitHub. Vercel will auto-redeploy.
          </p>
          <div class="dash-field" style="margin-bottom:1rem;">
            <label>GitHub Personal Access Token (PAT)</label>
            <input type="password" id="githubToken" placeholder="ghp_xxxxxxxxxxxx">
            <small style="color:var(--dash-muted);">Generate at github.com/settings/tokens (repo scope)</small>
          </div>
          <button class="dash-btn dash-btn--success" onclick="Dashboard.publishToGithub()">🚀 Publish to GitHub</button>
          <div id="githubResult" style="margin-top:1rem;"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="src/js/auth.js"></script>
</body>
</html>
